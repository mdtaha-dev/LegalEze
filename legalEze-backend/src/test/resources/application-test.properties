spring.application.name=LegalEze

# Disable datasource auto-configuration during tests
# (no PostgreSQL/Redis required for pure unit tests)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration,\
  org.springframework.ai.model.google.genai.autoconfigure.GoogleGenAiAutoConfiguration,\
  org.springframework.ai.model.google.genai.autoconfigure.GoogleGenAiEmbeddingAutoConfiguration

# Disable Spring AI auto-configs that require live services
spring.ai.vectorstore.pgvector.initialize-schema=false
